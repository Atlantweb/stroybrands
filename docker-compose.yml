services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: stroybrands
      MYSQL_USER: stroybrands
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-stroybrands}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:4000:4000"
    environment:
      NODE_ENV: production
      DATABASE_PROVIDER: mysql
      DATABASE_URL: mysql://stroybrands:${MYSQL_PASSWORD:-stroybrands}@mysql:3306/stroybrands
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      PORT: 4000
      NEXT_PUBLIC_API_URL: https://stroybrands.ru/api
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
